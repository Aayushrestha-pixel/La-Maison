openapi: 3.0.3

info:
  title: La Maison Restaurant API
  description: |
    REST API for the La Maison Restaurant Management System.
    Covers table bookings, menu items, and reservation status management.

    **Base URL (development):** `http://localhost:5000/api`

    **Authentication:** Currently open. Add Bearer token auth before going to production.
  version: 1.0.0
  contact:
    name: La Maison Dev
    email: dev@lamaison.np

servers:
  - url: http://localhost:5000/api
    description: Local development server
  - url: https://api.lamaison.np/v1
    description: Production server

tags:
  - name: Bookings
    description: Table reservation operations
  - name: Menu
    description: Menu item operations
  - name: Health
    description: API health check

# ─────────────────────────────────────────────
# PATHS
# ─────────────────────────────────────────────
paths:

  # ── BOOKINGS ──────────────────────────────
  /bookings:
    get:
      tags: [Bookings]
      summary: Get all bookings
      description: Returns a list of all reservations. Supports filtering by status and date.
      operationId: getAllBookings
      parameters:
        - $ref: '#/components/parameters/StatusFilter'
        - $ref: '#/components/parameters/DateFilter'
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: List of bookings returned successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookingListResponse'
              example:
                data:
                  - id: 1
                    name: Aayush Sharma
                    email: aayush@email.com
                    phone: "9841234567"
                    date: "2025-08-10"
                    time: "19:00"
                    guests: 2
                    occasion: anniversary
                    notes: Window seat preferred
                    status: confirmed
                    createdAt: "2025-07-28T10:30:00Z"
                total: 1
                page: 1
                limit: 20
        '500':
          $ref: '#/components/responses/InternalError'

    post:
      tags: [Bookings]
      summary: Create a new booking
      description: Submits a new table reservation request. Status defaults to `pending`.
      operationId: createBooking
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BookingCreateRequest'
            example:
              name: Aayush Sharma
              email: aayush@email.com
              phone: "9841234567"
              date: "2025-08-10"
              time: "19:00"
              guests: 2
              occasion: anniversary
              notes: Window seat preferred
      responses:
        '201':
          description: Booking created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookingResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          description: Time slot conflict — table not available
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Conflict
                message: No tables available for this time slot
                statusCode: 409
        '500':
          $ref: '#/components/responses/InternalError'

  /bookings/{id}:
    parameters:
      - $ref: '#/components/parameters/BookingId'

    get:
      tags: [Bookings]
      summary: Get a single booking
      description: Returns full details of one reservation by ID.
      operationId: getBookingById
      responses:
        '200':
          description: Booking found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookingResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

    put:
      tags: [Bookings]
      summary: Replace a booking (full update)
      description: Replaces all fields of an existing booking. All required fields must be provided.
      operationId: replaceBooking
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BookingCreateRequest'
      responses:
        '200':
          description: Booking fully updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookingResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

    patch:
      tags: [Bookings]
      summary: Partially update a booking
      description: Update one or more fields. Commonly used to change status (confirmed / cancelled).
      operationId: updateBooking
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BookingPatchRequest'
            examples:
              confirm:
                summary: Confirm a booking
                value:
                  status: confirmed
              reschedule:
                summary: Reschedule date and time
                value:
                  date: "2025-08-15"
                  time: "20:00"
      responses:
        '200':
          description: Booking updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookingResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

    delete:
      tags: [Bookings]
      summary: Delete a booking
      description: Permanently removes a reservation record.
      operationId: deleteBooking
      responses:
        '200':
          description: Booking deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  # ── MENU ──────────────────────────────────
  /menu:
    get:
      tags: [Menu]
      summary: Get all menu items
      description: Returns the full menu. Filter by category using the query param.
      operationId: getAllMenuItems
      parameters:
        - name: category
          in: query
          description: Filter by category
          required: false
          schema:
            type: string
            enum: [Starters, Mains, Desserts, Drinks]
      responses:
        '200':
          description: Menu items returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MenuListResponse'
              example:
                data:
                  - id: 1
                    name: Bruschetta al Pomodoro
                    description: Grilled bread with tomato, garlic, and fresh basil
                    price: 350
                    category: Starters
                    tag: Popular
                    available: true
                total: 1
        '500':
          $ref: '#/components/responses/InternalError'

    post:
      tags: [Menu]
      summary: Add a new menu item
      operationId: createMenuItem
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MenuItemCreateRequest'
            example:
              name: Truffle Pasta
              description: Fresh pasta with black truffle and parmesan
              price: 1200
              category: Mains
              tag: "Chef's Pick"
              available: true
      responses:
        '201':
          description: Menu item created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MenuItemResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'

  /menu/{id}:
    parameters:
      - $ref: '#/components/parameters/MenuItemId'

    get:
      tags: [Menu]
      summary: Get a single menu item
      operationId: getMenuItemById
      responses:
        '200':
          description: Menu item found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MenuItemResponse'
        '404':
          $ref: '#/components/responses/NotFound'

    put:
      tags: [Menu]
      summary: Replace a menu item (full update)
      operationId: replaceMenuItem
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MenuItemCreateRequest'
      responses:
        '200':
          description: Menu item updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MenuItemResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

    patch:
      tags: [Menu]
      summary: Partially update a menu item
      description: Useful for toggling availability or updating just the price.
      operationId: updateMenuItem
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MenuItemPatchRequest'
            examples:
              toggleAvailability:
                summary: Mark as unavailable
                value:
                  available: false
              updatePrice:
                summary: Update price only
                value:
                  price: 1350
      responses:
        '200':
          description: Menu item partially updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MenuItemResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags: [Menu]
      summary: Delete a menu item
      operationId: deleteMenuItem
      responses:
        '200':
          description: Menu item deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  # ── HEALTH ────────────────────────────────
  /health:
    get:
      tags: [Health]
      summary: Health check
      description: Returns 200 if the API is running. Use this to verify your backend is up.
      operationId: healthCheck
      responses:
        '200':
          description: API is running
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  timestamp:
                    type: string
                    format: date-time
                    example: "2025-08-10T10:00:00Z"

# ─────────────────────────────────────────────
# COMPONENTS
# ─────────────────────────────────────────────
components:

  # ── SCHEMAS ───────────────────────────────
  schemas:

    # Booking schemas
    Booking:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: Aayush Sharma
        email:
          type: string
          format: email
          example: aayush@email.com
        phone:
          type: string
          example: "9841234567"
        date:
          type: string
          format: date
          example: "2025-08-10"
        time:
          type: string
          example: "19:00"
        guests:
          type: string
          example: "2"
        occasion:
          type: string
          enum: [birthday, anniversary, business, date, other, ""]
          example: anniversary
        notes:
          type: string
          example: Window seat preferred
        status:
          type: string
          enum: [pending, confirmed, cancelled]
          example: confirmed
        createdAt:
          type: string
          format: date-time
          example: "2025-07-28T10:30:00Z"

    BookingCreateRequest:
      type: object
      required: [name, email, phone, date, time, guests]
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 100
          example: Aayush Sharma
        email:
          type: string
          format: email
          example: aayush@email.com
        phone:
          type: string
          minLength: 7
          maxLength: 20
          example: "9841234567"
        date:
          type: string
          format: date
          example: "2025-08-10"
        time:
          type: string
          pattern: '^([01]\d|2[0-3]):[0-5]\d$'
          example: "19:00"
        guests:
          type: string
          example: "2"
        occasion:
          type: string
          enum: [birthday, anniversary, business, date, other, ""]
          example: anniversary
        notes:
          type: string
          maxLength: 500
          example: Window seat preferred

    BookingPatchRequest:
      type: object
      minProperties: 1
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
        date:
          type: string
          format: date
        time:
          type: string
        guests:
          type: string
        occasion:
          type: string
          enum: [birthday, anniversary, business, date, other, ""]
        notes:
          type: string
        status:
          type: string
          enum: [pending, confirmed, cancelled]

    BookingResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/Booking'

    BookingListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Booking'
        total:
          type: integer
          example: 25
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 20

    # Menu schemas
    MenuItem:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: Bruschetta al Pomodoro
        description:
          type: string
          example: Grilled bread with tomato, garlic, and fresh basil
        price:
          type: number
          format: float
          example: 350
        category:
          type: string
          enum: [Starters, Mains, Desserts, Drinks]
          example: Starters
        tag:
          type: string
          nullable: true
          example: Popular
        available:
          type: boolean
          example: true

    MenuItemCreateRequest:
      type: object
      required: [name, description, price, category]
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 100
          example: Truffle Pasta
        description:
          type: string
          maxLength: 300
          example: Fresh pasta with black truffle and parmesan
        price:
          type: number
          format: float
          minimum: 0
          example: 1200
        category:
          type: string
          enum: [Starters, Mains, Desserts, Drinks]
          example: Mains
        tag:
          type: string
          nullable: true
          example: "Chef's Pick"
        available:
          type: boolean
          default: true
          example: true

    MenuItemPatchRequest:
      type: object
      minProperties: 1
      properties:
        name:
          type: string
        description:
          type: string
        price:
          type: number
          format: float
          minimum: 0
        category:
          type: string
          enum: [Starters, Mains, Desserts, Drinks]
        tag:
          type: string
          nullable: true
        available:
          type: boolean

    MenuItemResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/MenuItem'

    MenuListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/MenuItem'
        total:
          type: integer
          example: 13

    # Shared schemas
    DeleteResponse:
      type: object
      properties:
        message:
          type: string
          example: Deleted successfully
        id:
          type: integer
          example: 1

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          example: Not Found
        message:
          type: string
          example: Booking with id 99 not found
        statusCode:
          type: integer
          example: 404

  # ── PARAMETERS ────────────────────────────
  parameters:

    BookingId:
      name: id
      in: path
      required: true
      description: Unique booking ID
      schema:
        type: integer
        example: 1

    MenuItemId:
      name: id
      in: path
      required: true
      description: Unique menu item ID
      schema:
        type: integer
        example: 1

    StatusFilter:
      name: status
      in: query
      required: false
      description: Filter bookings by status
      schema:
        type: string
        enum: [pending, confirmed, cancelled]

    DateFilter:
      name: date
      in: query
      required: false
      description: Filter bookings by date (YYYY-MM-DD)
      schema:
        type: string
        format: date
        example: "2025-08-10"

    PageParam:
      name: page
      in: query
      required: false
      description: Page number for pagination
      schema:
        type: integer
        default: 1
        minimum: 1

    LimitParam:
      name: limit
      in: query
      required: false
      description: Number of results per page
      schema:
        type: integer
        default: 20
        minimum: 1
        maximum: 100

  # ── RESPONSES ─────────────────────────────
  responses:

    BadRequest:
      description: Invalid request body or missing required fields
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error: Bad Request
            message: "name is required"
            statusCode: 400

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error: Not Found
            message: Booking with id 99 not found
            statusCode: 404

    InternalError:
      description: Unexpected server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error: Internal Server Error
            message: Something went wrong
            statusCode: 500